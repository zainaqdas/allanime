<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AllManga - Stream anime episodes with a clean, modern interface">
  <title>AllManga</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237c3aed'/><text x='16' y='22' font-size='18' font-weight='700' text-anchor='middle' fill='white'>A</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="app-container header-inner">
      <a href="#/" class="logo" data-nav>
        <div class="logo-icon">A</div>
        <span>AllManga</span>
      </a>
      <div class="search-bar">
        <span class="search-icon">&#128269;</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search anime..."
          autocomplete="off"
        />
      </div>
      <button class="btn btn-primary btn-sm" id="searchBtn">Search</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-container" id="app">
    <div class="loading-spinner">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/hls.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
